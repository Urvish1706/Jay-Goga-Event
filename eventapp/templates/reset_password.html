{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">
Reset Password
</h3>

{% if messages %}
{% for message in messages %}
<div class="alert alert-warning">
{{ message }}
</div>
{% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>New Password</label>

<input
type="password"
name="password1"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
name="password2"
class="form-control"
required>

</div>

<button
class="btn btn-success w-100">

Update Password

</button>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
