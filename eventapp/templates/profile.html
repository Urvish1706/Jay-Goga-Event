{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-dark">
    <h3 class="mb-0 text-white">My Profile</h3>
</div>

                <div class="card-body">
                    <h4 class="mb-4">Welcome, {{ user.first_name }} {{ user.last_name }} 👋</h4>

                    <table class="table">
                        <tr>
                            <th>Name:</th>
                            <td>{{ user.first_name }} {{ user.last_name }}</td>
                        </tr>
                        <tr>
                            <th>Email:</th>
                            <td>{{ user.email }}</td>
                        </tr>
                        <tr>
                            <th>Joined Date:</th>
                            <td>{{ user.date_joined|date:"d M Y" }}</td>
                        </tr>
                    </table>

                    <a href="{% url 'change_password' %}" class="btn btn-primary">
                        Change Password
                    </a>

                    <a href="{% url 'logout' %}" class="btn btn-danger">
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
